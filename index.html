<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SETECT LYBRARY MANAGEMENT</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="auth-page">
  <div class="auth-brand">
    <div class="brand-mark"><img src="./img/photo_2026-04-26_00-16-27.jpg" alt=""></div>
    <div>
      <span class="brand-name">SETECT INSTITUTE</span>
      <span class="brand-tag">Library Management</span>
    </div>
  </div>

  <div class="auth-card">
    <div class="card-body">
      <div class="auth-tabs">
        <button type="button" id="tabLoginBtn" class="active">Log in</button>
        <button type="button" id="tabRegisterBtn">Register</button>
      </div>

      <!-- LOGIN FORM -->
      <div id="loginPane">
        <h2 class="auth-title">Welcome back</h2>
        <p class="auth-sub">Sign in to manage books, categories and orders.</p>

        <div class="auth-error" id="loginError"></div>

        <form id="loginForm" novalidate>
          <label class="form-label-lib" for="loginEmail">Email</label>
          <input class="form-control-lib" type="email" id="loginEmail" placeholder="Enter your email" required>
          <div class="position-relative">
            <label class="form-label-lib" for="loginPassword">Password</label>
            <i class="bi bi-eye position-absolute eye" id="eyePass"></i>
            <input class="form-control-lib" type="password" id="loginPassword" placeholder="Enter your password" required>
          </div>

          <button type="submit" class="btn-lib rounded-5 btn-lib-primary mt-3">Log in</button>
        </form>

        <p class="auth-footnote">No account yet? <a href="#" id="goRegister">Create one</a></p>
      </div>

      <!-- REGISTER FORM -->
      <div id="registerPane" style="display:none;">
        <h2 class="auth-title">Create your account</h2>
        <p class="auth-sub">Join as a library member in seconds.</p>

        <div class="auth-error" id="registerError"></div>
        <div class="auth-success" id="registerSuccess"></div>

        <form id="registerForm" novalidate>
          <label class="form-label-lib" for="regName">Full name</label>
          <input class="form-control-lib" type="text" id="regName" placeholder="Enter your name" required>
          <p class="form-label-lib text-danger" id="fullNameErr"></p>

          <label class="form-label-lib" for="regEmail">Email</label>
          <input class="form-control-lib" type="email" id="regEmail" placeholder="Enter your email" required>
          <p class="form-label-lib text-danger" id="emailErr"></p>
          <div class="position-relative">
            <label class="form-label-lib" for="regPassword">Password</label>
            <i class="bi bi-eye position-absolute eye" id="eyePassRe"></i>
            <input class="form-control-lib" type="password" id="regPassword" placeholder="Enter your password" required>
          </div>
          
          <p class="form-label-lib text-danger" id="passwordErr"></p>

          <label class="form-label-lib" for="regConfirm">Confirm password</label>
          <input class="form-control-lib" type="password" id="regConfirm" placeholder="Confirm your password" required>
          <p class="form-label-lib text-danger" id="confirmPassErr"></p>

          <button type="submit" class="btn-lib rounded-5 btn-lib-primary mt-3">Create account</button>
        </form>

        <p class="auth-footnote">Already a member? <a href="#" id="goLogin">Log in</a></p>
      </div>

    </div>
  </div>
</div>

<div class="toast-stack" id="toastStack"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script src="js/utils.js" type="module"></script>
<script src="js/auth.js" type="module"></script>
</body>
</html>
